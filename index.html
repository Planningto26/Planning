<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Operai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem}
.app{max-width:1200px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;border:1px solid #e0dfd8}
.btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.danger:hover{background:#791F1F}
.btn.sm{padding:3px 8px;font-size:11px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.nav-bar span{font-size:13px;color:#666;min-width:180px;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.grid-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead th{font-size:11px;font-weight:500;color:#666;padding:7px 5px;border-bottom:1px solid #e8e8e4;text-align:center;background:#f8f8f6}
tbody tr{border-bottom:1px solid #f0f0ec}
tbody tr:hover td{background:#fafaf8}
td.date-cell{padding:6px 8px;font-size:11px;font-weight:600;color:#444;white-space:nowrap;border-right:1px solid #e8e8e4;vertical-align:middle}
td.shift-cell{padding:4px 3px;text-align:center;min-width:110px;vertical-align:top}
.sbadge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;min-width:44px;position:relative;user-select:none}
.sbadge:hover{opacity:.8}
.sG{background:#B5D4F4;color:#0C447C}
.sN{background:#CECBF6;color:#3C3489}
.sR{background:#D3D1C7;color:#444}
.sFE{background:#F5C4B3;color:#712B13}
.sOFF{background:transparent;color:#bbb;border:1px dashed #ddd}
.ndot{position:absolute;top:1px;left:1px;width:5px;height:5px;border-radius:50%;background:#185FA5}
.otbadge{display:inline-block;font-size:9px;font-weight:700;background:#FAC775;color:#633806;border-radius:3px;padding:1px 4px;margin-left:2px;vertical-align:middle}
.cnote{font-size:9px;color:#185FA5;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:104px;display:block;text-align:center}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1.25rem}
.scard{background:#f5f5f3;border-radius:8px;padding:10px 14px;flex:1;min-width:90px}
.scard .sl{font-size:11px;color:#888;margin-bottom:3px}
.scard .sv{font-size:20px;font-weight:700;color:#1a1a1a}
/* Modal — usa position:fixed, nessun ID condiviso tra istanze */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.mbox{background:#fff;border-radius:12px;border:1px solid #ddd;padding:1.5rem;width:100%;max-width:390px;max-height:88vh;overflow-y:auto}
.mbox h3{font-size:15px;font-weight:700;margin-bottom:2px}
.msub{font-size:12px;color:#888;margin-bottom:14px}
.mlbl{font-size:11px;font-weight:600;color:#555;display:block;margin:12px 0 4px}
.mbox input[type=text],.mbox input[type=number],.mbox select,.mbox textarea{
  width:100%;padding:7px 10px;font-size:13px;border-radius:8px;
  border:1px solid #ccc;background:#fff;color:#1a1a1a;outline:none}
.mbox textarea{resize:vertical;min-height:72px}
.mactions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.spicker{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:2px}
.spbtn{padding:7px 4px;border-radius:4px;font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;text-align:center;transition:border-color .12s}
.spbtn.sel{border-color:#185FA5}
.otrow{display:flex;align-items:center;gap:8px;margin-top:12px;padding:8px 10px;border-radius:8px;background:#FFF8EC;border:1px solid #FAC775}
.otlbl{display:flex;align-items:center;gap:6px;font-size:12px;color:#633806;font-weight:700;cursor:pointer;flex:1}
.otlbl input[type=checkbox]{width:15px;height:15px;accent-color:#BA7517;flex-shrink:0;cursor:pointer}
.othours{display:flex;align-items:center;gap:5px}
.othours input{width:66px;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid #FAC775;outline:none}
.othours span{font-size:12px;color:#633806}
.tipo-cc{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#CECBF6;color:#3C3489}
.tipo-to{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#C0DD97;color:#27500A}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:540px}
.mgwrap{overflow-x:auto;margin-bottom:1rem}
.dhead{font-size:11px;font-weight:500;color:#666;text-align:center;padding:4px 0;background:#f8f8f6;border-radius:3px}
.mday{border-radius:5px;border:1px solid #eee;background:#fff;min-height:62px;padding:4px;cursor:pointer}
.mday:hover{border-color:#999}
.mday.om{opacity:.3;cursor:default}
.mday.td{border-color:#185FA5}
.dnum{font-size:10px;color:#888;margin-bottom:2px}
.mshift{font-size:9px;font-weight:700;border-radius:2px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;
  padding:9px 22px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <h1 style="font-size:20px;font-weight:700;margin-bottom:1.25rem">&#128197; Planning Operai</h1>

  <div class="toolbar">
    <div style="display:flex;gap:4px">
      <button class="btn active" id="tab-week" onclick="switchView('week')">Vista settimana</button>
      <button class="btn" id="tab-month" onclick="switchView('month')">Vista mese</button>
    </div>
    <button class="btn primary" onclick="openAddWorker()">+ Aggiungi operaio</button>
    <button class="btn" onclick="openManageWorkers()">Gestisci operai</button>
    <button class="btn" onclick="exportCSV()">&#11015; Esporta CSV</button>
  </div>

  <div class="nav-bar">
    <button class="btn" onclick="navPrev()">&#8592;</button>
    <span id="nav-label"></span>
    <button class="btn" onclick="navNext()">&#8594;</button>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4"></div>Giornata (G)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#CECBF6"></div>Notte (N)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D3D1C7"></div>Riposo (R)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#F5C4B3"></div>Ferie (FE)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>Straordinario</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5;border-radius:50%;width:6px;height:6px"></div>Nota</div>
  </div>

  <div style="position:relative">
    <div id="view-week">
      <div class="grid-wrapper">
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
      </div>
      <div class="summary-row" id="summary"></div>
    </div>
    <div id="view-month" style="display:none">
      <div class="mgwrap"><div class="mgrid" id="mgrid"></div></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#666">Operaio:</span>
        <select id="msel" onchange="renderMonth()"
          style="font-size:13px;padding:5px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;outline:none"></select>
      </div>
      <div class="summary-row" id="msummary"></div>
    </div>
    <div id="modal-root"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// COSTANTI
// ═══════════════════════════════════════════════════════════════════════════════
const SHIFTS = ['G','N','R','FE','OFF'];
const SL = {G:'Giornata', N:'Notte', R:'Riposo', FE:'Ferie', OFF:'Non assegnato'};
const SBG = {G:'#B5D4F4', N:'#CECBF6', R:'#D3D1C7', FE:'#F5C4B3', OFF:'transparent'};
const SFG = {G:'#0C447C', N:'#3C3489', R:'#444', FE:'#712B13', OFF:'#bbb'};
const SCS = {G:'sG', N:'sN', R:'sR', FE:'sFE', OFF:'sOFF'};
const DIT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MIT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
             'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// ═══════════════════════════════════════════════════════════════════════════════
// STATO APP
// ═══════════════════════════════════════════════════════════════════════════════
let view = 'week';
let wkStart = wkOf(new Date('2026-05-01'));
let curMon = {y:2026, m:4};
let nid = 100;

let workers = JSON.parse(localStorage.getItem('po_w') || 'null') || [
  {id:1, name:'Marco Bianchi',   role:'Elettricista', tipo:'Tecnico/Operaio'},
  {id:2, name:'Luigi Rossi',     role:'Idraulico',    tipo:'Tecnico/Operaio'},
  {id:3, name:'Giovanni Verdi',  role:'Muratore',     tipo:'Tecnico/Operaio'},
  {id:4, name:'Antonio Neri',    role:'Carpentiere',  tipo:'Capo Cantiere'},
  {id:5, name:'Franco Esposito', role:'Elettricista', tipo:'Tecnico/Operaio'},
];
let sched = JSON.parse(localStorage.getItem('po_s') || '{}');
let otime = JSON.parse(localStorage.getItem('po_o') || '{}');
let nots  = JSON.parse(localStorage.getItem('po_n') || '{}');

function persist(){
  localStorage.setItem('po_w', JSON.stringify(workers));
  localStorage.setItem('po_s', JSON.stringify(sched));
  localStorage.setItem('po_o', JSON.stringify(otime));
  localStorage.setItem('po_n', JSON.stringify(nots));
}

// ═══════════════════════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════════════════════
function wkOf(d){
  const dt=new Date(d), day=dt.getDay();
  dt.setDate(dt.getDate()+(day===0?-6:1-day)); dt.setHours(0,0,0,0); return dt;
}
function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d){ return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}); }
function key(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dw(d){ return d.getDay()===0?6:d.getDay()-1; }
function h(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function gS(wid,dk){ return (sched[wid]&&sched[wid][dk])||'OFF'; }
function sS(wid,dk,v){ if(!sched[wid])sched[wid]={}; sched[wid][dk]=v; persist(); }
function gO(wid,dk){ return (otime[wid]&&otime[wid][dk])||0; }
function sO(wid,dk,v){ if(!otime[wid])otime[wid]={}; otime[wid][dk]=v; persist(); }
function gN(wid,dk){ return (nots[wid]&&nots[wid][dk])||''; }
function sN(wid,dk,v){ if(!nots[wid])nots[wid]={}; nots[wid][dk]=v; persist(); }

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}
function tbadge(w){
  return w.tipo==='Capo Cantiere'
    ? `<span class="tipo-cc">Capo Cantiere</span>`
    : `<span class="tipo-to">Tecnico/Operaio</span>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// NAVIGAZIONE
// ═══════════════════════════════════════════════════════════════════════════════
function switchView(v){
  view=v;
  document.getElementById('view-week').style.display  = v==='week' ?'':'none';
  document.getElementById('view-month').style.display = v==='month'?'':'none';
  document.getElementById('tab-week').className  = 'btn'+(v==='week' ?' active':'');
  document.getElementById('tab-month').className = 'btn'+(v==='month'?' active':'');
  v==='month'?renderMonth():render();
}
function navPrev(){
  if(view==='week'){ wkStart=addD(wkStart,-7); render(); }
  else{ if(--curMon.m<0){curMon.m=11;curMon.y--;} renderMonth(); }
}
function navNext(){
  if(view==='week'){ wkStart=addD(wkStart,7); render(); }
  else{ if(++curMon.m>11){curMon.m=0;curMon.y++;} renderMonth(); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER SETTIMANA
// ═══════════════════════════════════════════════════════════════════════════════
function render(){
  const days=[];
  for(let i=0;i<7;i++) days.push(addD(wkStart,i));
  document.getElementById('nav-label').textContent = fmt(days[0])+' — '+fmt(days[6])+' '+days[0].getFullYear();

  // Header: Data + colonna per operaio
  const ths = workers.map(w=>
    `<th style="min-width:115px;padding:6px 4px;background:#f8f8f6;border-bottom:1px solid #e8e8e4">
      <div style="font-size:11px;font-weight:700;color:#1a1a1a">${h(w.name)}</div>
      <div style="font-size:10px;color:#888;margin:1px 0">${h(w.role)}</div>
      ${tbadge(w)}
    </th>`).join('');
  document.getElementById('thead').innerHTML =
    `<tr><th style="text-align:left;min-width:82px;padding:7px 8px;background:#f8f8f6;border-bottom:1px solid #e8e8e4;font-size:11px;font-weight:500;color:#666">Data</th>${ths}</tr>`;

  // Righe: una per giorno
  const trs = days.map(d=>{
    const dk=key(d);
    const dtd=`<td class="date-cell">${DIT[dw(d)]}<br><span style="font-weight:400;color:#888;font-size:10px">${fmt(d)}</span></td>`;
    const wtds=workers.map(w=>{
      const s=gS(w.id,dk), ot=gO(w.id,dk), note=gN(w.id,dk);
      return `<td class="shift-cell">
        <span class="sbadge ${SCS[s]}" onclick="cycleS(${w.id},'${dk}')">
          ${s==='OFF'?'—':s}${note?'<span class="ndot"></span>':''}
        </span>${ot>0?`<span class="otbadge">+${ot}h</span>`:''}
        ${note?`<span class="cnote" title="${h(note)}">${h(note)}</span>`:''}
        <div style="margin-top:3px"><button class="btn sm" onclick="openDetail(${w.id},'${dk}')">&#9998;</button></div>
      </td>`;
    }).join('');
    return `<tr>${dtd}${wtds}</tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML = trs;
  renderSum(days);
}

function cycleS(wid,dk){
  const i=SHIFTS.indexOf(gS(wid,dk));
  sS(wid,dk,SHIFTS[(i+1)%SHIFTS.length]);
  render();
}

function renderSum(days){
  let ore=0,ot=0,att=0,nti=0,fe=0;
  workers.forEach(w=>{
    let ha=false;
    days.forEach(d=>{
      const dk=key(d),s=gS(w.id,dk);
      if(['G','N'].includes(s)){ore+=8;ha=true;}
      if(s==='N')nti++; if(s==='FE')fe++;
      ot+=gO(w.id,dk);
    });
    if(ha)att++;
  });
  document.getElementById('summary').innerHTML=`
    <div class="scard"><div class="sl">Ore totali</div><div class="sv">${ore}h</div></div>
    <div class="scard"><div class="sl">Straordinari</div><div class="sv" style="color:#BA7517">${ot}h</div></div>
    <div class="scard"><div class="sl">Operai attivi</div><div class="sv">${att}</div></div>
    <div class="scard"><div class="sl">Turni notte</div><div class="sv">${nti}</div></div>
    <div class="scard"><div class="sl">Ferie/riposi</div><div class="sv">${fe}</div></div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER MESE
// ═══════════════════════════════════════════════════════════════════════════════
function renderMonth(){
  const {y,m}=curMon;
  document.getElementById('nav-label').textContent=MIT[m]+' '+y;
  const sel=document.getElementById('msel');
  const prev=sel.value;
  sel.innerHTML=workers.map(w=>`<option value="${w.id}">${h(w.name)}</option>`).join('');
  if(prev&&workers.find(w=>w.id==prev))sel.value=prev;
  const wid=parseInt(sel.value)||workers[0]?.id;
  if(!wid)return;

  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const sdow=first.getDay()===0?6:first.getDay()-1;
  const today=key(new Date());
  const total=Math.ceil((sdow+last.getDate())/7)*7;

  let html=DIT.map(d=>`<div class="dhead">${d}</div>`).join('');
  for(let i=0;i<total;i++){
    const date=new Date(y,m,1+(i-sdow));
    const inM=date.getMonth()===m, dk=key(date);
    const s=gS(wid,dk),ot=gO(wid,dk),note=gN(wid,dk),isT=dk===today;
    html+=`<div class="mday${!inM?' om':''}${isT?' td':''}"
      ${inM?`onclick="openDetail(${wid},'${dk}')"`:'style="cursor:default"'}>
      <div class="dnum" style="${isT?'color:#185FA5;font-weight:700':''}">${date.getDate()}</div>
      ${inM&&s!=='OFF'?`<div class="mshift" style="background:${SBG[s]};color:${SFG[s]}">${SL[s]}${ot>0?` +${ot}h`:''}</div>`:''}
      ${note&&inM?`<div style="font-size:9px;color:#185FA5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(note)}</div>`:''}
    </div>`;
  }
  document.getElementById('mgrid').innerHTML=html;

  let ore=0,ot=0,nti=0,fe=0;
  for(let d=1;d<=last.getDate();d++){
    const dk=key(new Date(y,m,d)),s=gS(wid,dk);
    if(['G','N'].includes(s))ore+=8;
    if(s==='N')nti++; if(s==='FE')fe++;
    ot+=gO(wid,dk);
  }
  document.getElementById('msummary').innerHTML=`
    <div class="scard"><div class="sl">Ore lavorate</div><div class="sv">${ore}h</div></div>
    <div class="scard"><div class="sl">Straordinari</div><div class="sv" style="color:#BA7517">${ot}h</div></div>
    <div class="scard"><div class="sl">Turni notte</div><div class="sv">${nti}</div></div>
    <div class="scard"><div class="sl">Ferie</div><div class="sv">${fe}</div></div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODAL DETTAGLIO — usa CLOSURE, zero ID globali condivisi
// Ogni chiamata a openDetail crea un contesto completamente isolato.
// Le funzioni msSetShift / msToggleOT / msSave sono ricreate ogni volta
// come nuove funzioni con il loro proprio stato in chiusura.
// ═══════════════════════════════════════════════════════════════════════════════
function openDetail(wid, dk){
  const w = workers.find(x=>x.id===wid);
  if(!w) return;

  // Stato locale di questo modal — non condiviso con nessun altro
  const state = {
    shift : gS(wid, dk),
    ot    : gO(wid, dk),
    note  : gN(wid, dk)
  };

  const dateStr = new Date(dk+'T12:00:00')
    .toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  // Costruisce HTML bottoni turno
  function shiftBtns(){
    return SHIFTS.filter(s=>s!=='OFF').map(s=>
      `<button class="spbtn${state.shift===s?' sel':''}"
        style="background:${SBG[s]};color:${SFG[s]}"
        data-s="${s}">${SL[s]}</button>`
    ).join('')+
    `<button class="spbtn${state.shift==='OFF'?' sel':''}"
      style="background:#f0f0ee;color:#666" data-s="OFF">Non assegnato</button>`;
  }

  const root = document.getElementById('modal-root');

  root.innerHTML=`
  <div class="moverlay" id="moverlay">
    <div class="mbox">
      <h3>${h(w.name)}</h3>
      <div class="msub">${dateStr}</div>

      <span class="mlbl">Turno</span>
      <div class="spicker" id="spicker">${shiftBtns()}</div>

      <span class="mlbl">Commento</span>
      <textarea class="mnote" placeholder="Es. sostituzione collega, lavoro urgente...">${h(state.note)}</textarea>

      <div class="otrow">
        <label class="otlbl">
          <input type="checkbox" class="otchk" ${state.ot>0?'checked':''}> Straordinario
        </label>
        <div class="othours" style="${state.ot>0?'':'display:none'}">
          <input type="number" class="otval" min="0.5" max="12" step="0.5" value="${state.ot||''}" placeholder="ore">
          <span>ore</span>
        </div>
      </div>

      <div class="mactions">
        <button class="btn" id="mbtn-cancel">Annulla</button>
        <button class="btn primary" id="mbtn-save">Salva</button>
      </div>
    </div>
  </div>`;

  // Riferimenti DOM — tutti locali a questa closure, NON id globali
  const overlay  = root.querySelector('#moverlay');
  const picker   = root.querySelector('#spicker');
  const noteEl   = root.querySelector('.mnote');
  const otChk    = root.querySelector('.otchk');
  const otWrap   = root.querySelector('.othours');
  const otValEl  = root.querySelector('.otval');

  // Click bottoni turno
  picker.addEventListener('click', e=>{
    const btn = e.target.closest('.spbtn');
    if(!btn) return;
    state.shift = btn.dataset.s;
    picker.querySelectorAll('.spbtn').forEach(b=>b.classList.toggle('sel', b===btn));
  });

  // Aggiorna note in stato
  noteEl.addEventListener('input', ()=>{ state.note = noteEl.value; });

  // Toggle straordinario
  otChk.addEventListener('change', ()=>{
    otWrap.style.display = otChk.checked ? '' : 'none';
    if(!otChk.checked){ state.ot=0; otValEl.value=''; }
  });
  otValEl.addEventListener('input', ()=>{ state.ot = parseFloat(otValEl.value)||0; });

  // Chiudi cliccando overlay
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });

  // Annulla
  root.querySelector('#mbtn-cancel').addEventListener('click', closeModal);

  // Salva — legge tutto dallo stato locale
  root.querySelector('#mbtn-save').addEventListener('click', ()=>{
    state.note = noteEl.value.trim();
    state.ot   = otChk.checked ? (parseFloat(otValEl.value)||0) : 0;
    sS(wid, dk, state.shift);
    sO(wid, dk, state.ot);
    sN(wid, dk, state.note);
    closeModal();
    toast('Salvato!');
    view==='week' ? render() : renderMonth();
  });
}

function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

// ═══════════════════════════════════════════════════════════════════════════════
// GESTIONE OPERAI
// ═══════════════════════════════════════════════════════════════════════════════
function openManageWorkers(){
  if(!workers.length){ toast('Nessun operaio presente'); return; }
  const root=document.getElementById('modal-root');
  root.innerHTML=`
  <div class="moverlay" id="moverlay">
    <div class="mbox">
      <h3>Gestisci operai</h3>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px" id="wlist">
        ${workers.map(w=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #eee;border-radius:8px">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700">${h(w.name)}</div>
            <div style="font-size:11px;color:#888;margin-top:2px">${h(w.role)} &middot; ${tbadge(w)}</div>
          </div>
          <button class="btn danger sm" data-rid="${w.id}">&#x2715; Rimuovi</button>
        </div>`).join('')}
      </div>
      <div class="mactions"><button class="btn" id="mbtn-cancel">Chiudi</button></div>
    </div>
  </div>`;

  const overlay=root.querySelector('#moverlay');
  overlay.addEventListener('click',e=>{ if(e.target===overlay)closeModal(); });
  root.querySelector('#mbtn-cancel').addEventListener('click',closeModal);
  root.querySelectorAll('[data-rid]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=parseInt(btn.dataset.rid);
      if(!confirm('Rimuovere questo operaio dal planning?'))return;
      workers=workers.filter(w=>w.id!==id);
      delete sched[id]; delete otime[id]; delete nots[id];
      persist(); closeModal(); toast('Operaio rimosso');
      view==='week'?render():renderMonth();
    });
  });
}

function openAddWorker(){
  const root=document.getElementById('modal-root');
  root.innerHTML=`
  <div class="moverlay" id="moverlay">
    <div class="mbox">
      <h3>Aggiungi operaio</h3>
      <span class="mlbl">Nome e cognome</span>
      <input type="text" id="an" placeholder="Es. Mario Rossi" autofocus>
      <span class="mlbl">Qualifica / Ruolo</span>
      <input type="text" id="ar" placeholder="Es. Elettricista">
      <span class="mlbl">Tipo</span>
      <select id="at">
        <option value="Tecnico/Operaio">Tecnico/Operaio</option>
        <option value="Capo Cantiere">Capo Cantiere</option>
      </select>
      <div class="mactions">
        <button class="btn" id="mbtn-cancel">Annulla</button>
        <button class="btn primary" id="mbtn-save">Aggiungi</button>
      </div>
    </div>
  </div>`;

  const overlay=root.querySelector('#moverlay');
  overlay.addEventListener('click',e=>{ if(e.target===overlay)closeModal(); });
  root.querySelector('#mbtn-cancel').addEventListener('click',closeModal);
  root.querySelector('#mbtn-save').addEventListener('click',()=>{
    const name=document.getElementById('an').value.trim();
    const role=document.getElementById('ar').value.trim();
    const tipo=document.getElementById('at').value;
    if(!name){ alert("Inserisci il nome dell'operaio"); return; }
    workers.push({id:++nid, name, role:role||'Generico', tipo});
    persist(); closeModal(); toast('Operaio aggiunto!');
    view==='week'?render():renderMonth();
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// ESPORTA CSV
// ═══════════════════════════════════════════════════════════════════════════════
function exportCSV(){
  try{
    let rows=[],header=[];
    if(view==='week'){
      const days=[]; for(let i=0;i<7;i++) days.push(addD(wkStart,i));
      header=['Operaio','Tipo','Ruolo'];
      days.forEach(d=>{
        const dl=DIT[dw(d)]+' '+fmt(d);
        header.push('Turno '+dl,'Straord. '+dl,'Commento '+dl);
      });
      header.push('Ore reg.','Ore straord. tot.');
      rows=workers.map(w=>{
        const row=[w.name, w.tipo||'Tecnico/Operaio', w.role];
        let oreR=0,oreO=0;
        days.forEach(d=>{
          const dk=key(d),s=gS(w.id,dk),ot=gO(w.id,dk);
          row.push(SL[s], ot>0?ot+'h':'-', gN(w.id,dk));
          if(['G','N'].includes(s))oreR+=8; oreO+=ot;
        });
        row.push(oreR+'h', oreO>0?oreO+'h':'-');
        return row;
      });
    } else {
      const wid=parseInt(document.getElementById('msel').value);
      const w=workers.find(x=>x.id===wid);
      if(!w){ toast('Nessun operaio selezionato'); return; }
      header=['Data','Turno','Ore reg.','Straordinario (h)','Commento'];
      const last=new Date(curMon.y,curMon.m+1,0).getDate();
      for(let d=1;d<=last;d++){
        const date=new Date(curMon.y,curMon.m,d);
        const dk=key(date),s=gS(wid,dk),ot=gO(wid,dk);
        rows.push([fmt(date),SL[s],['G','N'].includes(s)?'8h':'0h',ot>0?ot+'h':'-',gN(wid,dk)]);
      }
      rows.unshift([`${w.name} (${w.tipo||'Tecnico/Operaio'}) — ${MIT[curMon.m]} ${curMon.y}`,'','','','']);
    }
    const q=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const csv=[header,...rows].map(r=>r.map(q).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='planning_operai.csv';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    toast('CSV esportato!');
  } catch(e){ toast('Errore: '+e.message); }
}

// ═══════════════════════════════════════════════════════════════════════════════

render();
</script>
