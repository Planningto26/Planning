<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Operai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem}
.app{max-width:1200px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;border:1px solid #e0dfd8}
h1{font-size:20px;font-weight:600;margin-bottom:1.25rem;color:#1a1a1a}
.btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.danger:hover{background:#791F1F}
.btn.sm{padding:3px 8px;font-size:11px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.nav-bar span{font-size:13px;color:#666;min-width:180px;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.grid-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{font-size:11px;font-weight:500;color:#666;padding:7px 5px;border-bottom:1px solid #e8e8e4;text-align:center;background:#f8f8f6}
tbody tr{border-bottom:1px solid #f0f0ec}
tbody tr:hover td{background:#fafaf8}
td.date-cell{padding:6px 8px;font-size:11px;font-weight:600;color:#444;white-space:nowrap;border-right:1px solid #e8e8e4;min-width:80px;vertical-align:middle}
td.shift-cell{padding:4px 3px;text-align:center;min-width:115px;vertical-align:top}
.shift-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;min-width:42px;user-select:none;position:relative}
.shift-badge:hover{opacity:.8}
.s-G{background:#B5D4F4;color:#0C447C}
.s-N{background:#CECBF6;color:#3C3489}
.s-R{background:#D3D1C7;color:#444}
.s-FE{background:#F5C4B3;color:#712B13}
.s-OFF{background:transparent;color:#aaa;border:1px dashed #ddd}
.ot-badge{display:inline-block;font-size:9px;font-weight:600;background:#FAC775;color:#633806;border-radius:3px;padding:1px 4px;margin-left:2px;vertical-align:middle}
.note-dot{position:absolute;top:1px;left:1px;width:5px;height:5px;border-radius:50%;background:#185FA5;pointer-events:none}
.cell-note{font-size:9px;color:#185FA5;margin-top:2px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px;display:block}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1.25rem}
.stat-card{background:#f5f5f3;border-radius:8px;padding:10px 14px;flex:1;min-width:90px}
.stat-card .slabel{font-size:11px;color:#888;margin-bottom:3px}
.stat-card .sval{font-size:20px;font-weight:600;color:#1a1a1a}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:12px;border:1px solid #ddd;padding:1.5rem;min-width:300px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:2px;color:#1a1a1a}
.modal-sub{font-size:12px;color:#888;margin-bottom:14px}
.mlabel{font-size:11px;color:#666;display:block;font-weight:500;margin-top:12px;margin-bottom:4px}
.modal input[type=text],.modal input[type=number],.modal select,.modal textarea{width:100%;padding:7px 10px;font-size:13px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;outline:none}
.modal textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.shift-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:2px}
.sp-btn{padding:7px 4px;border-radius:4px;font-size:11px;font-weight:600;border:2px solid transparent;cursor:pointer;text-align:center}
.sp-btn.selected{border-color:#185FA5 !important}
.ot-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding:8px 10px;border-radius:8px;background:#FFF8EC;border:1px solid #FAC775}
.ot-row .ot-label{display:flex;align-items:center;gap:6px;font-size:12px;color:#633806;font-weight:600;cursor:pointer;flex:1}
.ot-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#BA7517;flex-shrink:0}
.ot-hours{display:flex;align-items:center;gap:5px}
.ot-hours input{width:68px;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid #FAC775;background:#fff;color:#1a1a1a;outline:none}
.ot-hours span{font-size:12px;color:#633806}
.tipo-cc{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;background:#CECBF6;color:#3C3489}
.tipo-to{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;background:#C0DD97;color:#27500A}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:560px}
.month-grid-wrapper{overflow-x:auto;margin-bottom:1rem}
.day-header{font-size:11px;font-weight:500;color:#666;text-align:center;padding:4px 0;background:#f8f8f6;border-radius:3px}
.month-day{border-radius:5px;border:1px solid #eee;background:#fff;min-height:64px;padding:4px;cursor:pointer}
.month-day:hover{border-color:#aaa}
.month-day.other-month{opacity:.3;cursor:default}
.month-day.today{border-color:#185FA5}
.day-num{font-size:10px;color:#888;margin-bottom:2px}
.month-shift{font-size:9px;font-weight:600;border-radius:2px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:9px 22px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.container{position:relative}
</style>
</head>
<body>
<div class="app">
  <h1>&#128197; Planning Operai</h1>

  <div class="toolbar">
    <div style="display:flex;gap:4px">
      <button class="btn active" id="tab-week" onclick="switchView('week')">Vista settimana</button>
      <button class="btn" id="tab-month" onclick="switchView('month')">Vista mese</button>
    </div>
    <button class="btn primary" onclick="openAddWorker()">+ Aggiungi operaio</button>
    <button class="btn" onclick="openManageWorkers()">Gestisci operai</button>
    <button class="btn" onclick="exportCSV()">&#11015; Esporta CSV</button>
  </div>

  <div class="nav-bar">
    <button class="btn" onclick="navPrev()">&#8592;</button>
    <span id="nav-label"></span>
    <button class="btn" onclick="navNext()">&#8594;</button>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4"></div>Giornata (G)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#CECBF6"></div>Notte (N)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D3D1C7"></div>Riposo (R)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#F5C4B3"></div>Ferie (FE)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>Straordinario</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5;border-radius:50%;width:6px;height:6px"></div>Nota</div>
  </div>

  <div class="container">
    <div id="view-week">
      <div class="grid-wrapper">
        <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
      </div>
      <div class="summary-row" id="summary-row"></div>
    </div>

    <div id="view-month" style="display:none">
      <div class="month-grid-wrapper">
        <div class="month-grid" id="month-grid"></div>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:#666">Operaio:</label>
        <select id="month-worker-sel" onchange="renderMonth()" style="font-size:13px;padding:5px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;outline:none"></select>
      </div>
      <div class="summary-row" id="month-summary"></div>
    </div>

    <div id="modal-area"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Costanti ──────────────────────────────────────────────────────────────────
const SHIFTS       = ['G','N','R','FE','OFF'];
const SHIFT_LABELS = {G:'Giornata', N:'Notte', R:'Riposo', FE:'Ferie', OFF:'Non assegnato'};
const SHIFT_BG     = {G:'#B5D4F4', N:'#CECBF6', R:'#D3D1C7', FE:'#F5C4B3', OFF:'transparent'};
const SHIFT_FG     = {G:'#0C447C', N:'#3C3489', R:'#444',    FE:'#712B13', OFF:'#aaa'};
const SHIFT_CSS    = {G:'s-G',     N:'s-N',     R:'s-R',     FE:'s-FE',    OFF:'s-OFF'};
const DAYS_IT      = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MONTHS_IT    = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                      'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// ── Stato globale UI ──────────────────────────────────────────────────────────
let currentView      = 'week';
let currentWeekStart = getWeekStart(new Date('2026-05-01'));
let currentMonth     = {y:2026, m:4};
let nextId           = 100;

// Stato isolato del modal: un unico oggetto che viene
// completamente sovrascritto ad ogni apertura.
// Nessun ID DOM condiviso tra operai diversi.
let MS = null; // Modal State

// ── Dati persistenti ──────────────────────────────────────────────────────────
let workers  = JSON.parse(localStorage.getItem('po_workers')  || 'null') || [
  {id:1, name:'Marco Bianchi',   role:'Elettricista', tipo:'Tecnico/Operaio'},
  {id:2, name:'Luigi Rossi',     role:'Idraulico',    tipo:'Tecnico/Operaio'},
  {id:3, name:'Giovanni Verdi',  role:'Muratore',     tipo:'Tecnico/Operaio'},
  {id:4, name:'Antonio Neri',    role:'Carpentiere',  tipo:'Capo Cantiere'},
  {id:5, name:'Franco Esposito', role:'Elettricista', tipo:'Tecnico/Operaio'},
];
let schedule = JSON.parse(localStorage.getItem('po_schedule') || '{}');
let overtime = JSON.parse(localStorage.getItem('po_overtime') || '{}');
let notes    = JSON.parse(localStorage.getItem('po_notes')    || '{}');

function save(){
  localStorage.setItem('po_workers',  JSON.stringify(workers));
  localStorage.setItem('po_schedule', JSON.stringify(schedule));
  localStorage.setItem('po_overtime', JSON.stringify(overtime));
  localStorage.setItem('po_notes',    JSON.stringify(notes));
}

// ── Utility ───────────────────────────────────────────────────────────────────
function getWeekStart(d){
  const dt = new Date(d); const day = dt.getDay();
  dt.setDate(dt.getDate() + (day===0 ? -6 : 1-day));
  dt.setHours(0,0,0,0); return dt;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){ return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}); }
function fmtKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dow(d){ return d.getDay()===0 ? 6 : d.getDay()-1; }
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getShift(wid,dk){ return (schedule[wid]&&schedule[wid][dk])||'OFF'; }
function setShift(wid,dk,s){ if(!schedule[wid])schedule[wid]={}; schedule[wid][dk]=s; save(); }
function getOT(wid,dk){ return (overtime[wid]&&overtime[wid][dk])||0; }
function setOT(wid,dk,v){ if(!overtime[wid])overtime[wid]={}; overtime[wid][dk]=v; save(); }
function getNote(wid,dk){ return (notes[wid]&&notes[wid][dk])||''; }
function setNote(wid,dk,v){ if(!notes[wid])notes[wid]={}; notes[wid][dk]=v; save(); }

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

function tipoBadge(w){
  const cc = w.tipo==='Capo Cantiere';
  return `<span class="${cc?'tipo-cc':'tipo-to'}">${esc(w.tipo||'Tecnico/Operaio')}</span>`;
}

// ── Navigazione ───────────────────────────────────────────────────────────────
function switchView(v){
  currentView=v;
  document.getElementById('view-week').style.display  = v==='week'  ?'':'none';
  document.getElementById('view-month').style.display = v==='month' ?'':'none';
  document.getElementById('tab-week').className  = 'btn'+(v==='week' ?' active':'');
  document.getElementById('tab-month').className = 'btn'+(v==='month'?' active':'');
  v==='month' ? renderMonth() : render();
}
function navPrev(){
  if(currentView==='week'){ currentWeekStart=addDays(currentWeekStart,-7); render(); }
  else{ if(--currentMonth.m<0){currentMonth.m=11;currentMonth.y--;} renderMonth(); }
}
function navNext(){
  if(currentView==='week'){ currentWeekStart=addDays(currentWeekStart,7); render(); }
  else{ if(++currentMonth.m>11){currentMonth.m=0;currentMonth.y++;} renderMonth(); }
}

// ── Vista settimana ───────────────────────────────────────────────────────────
function render(){
  const days=[];
  for(let i=0;i<7;i++) days.push(addDays(currentWeekStart,i));
  document.getElementById('nav-label').textContent =
    fmtDate(days[0])+' — '+fmtDate(days[6])+' '+days[0].getFullYear();

  // Intestazione: prima colonna = Data, poi una per ogni operaio
  const thW = workers.map(w=>
    `<th style="min-width:115px;text-align:center;padding:6px 4px;border-bottom:1px solid #e8e8e4;background:#f8f8f6">
      <div style="font-size:11px;font-weight:600;color:#1a1a1a">${esc(w.name)}</div>
      <div style="font-size:10px;color:#888;margin:1px 0">${esc(w.role)}</div>
      ${tipoBadge(w)}
    </th>`).join('');
  document.getElementById('table-head').innerHTML =
    `<tr><th style="text-align:left;min-width:82px;padding-left:8px;border-bottom:1px solid #e8e8e4;background:#f8f8f6;font-size:11px;font-weight:500;color:#666">Data</th>${thW}</tr>`;

  // Righe: una per giorno
  const rows = days.map(d=>{
    const dk = fmtKey(d);
    const dateTd = `<td class="date-cell">${DAYS_IT[dow(d)]}<br>
      <span style="font-weight:400;color:#888">${fmtDate(d)}</span></td>`;

    const wTds = workers.map(w=>{
      const s    = getShift(w.id,dk);
      const ot   = getOT(w.id,dk);
      const note = getNote(w.id,dk);
      return `<td class="shift-cell">
        <span class="shift-badge ${SHIFT_CSS[s]}" onclick="cycleShift(${w.id},'${dk}')">
          ${s==='OFF'?'—':s}${note?'<span class="note-dot"></span>':''}
        </span>${ot>0?`<span class="ot-badge">+${ot}h</span>`:''}
        ${note?`<span class="cell-note" title="${esc(note)}">${esc(note)}</span>`:''}
        <div style="margin-top:3px">
          <button class="btn sm" onclick="openCellDetail(${w.id},'${dk}')">&#9998;</button>
        </div>
      </td>`;
    }).join('');
    return `<tr>${dateTd}${wTds}</tr>`;
  }).join('');
  document.getElementById('table-body').innerHTML = rows;
  renderSummary(days);
}

function cycleShift(wid,dk){
  const cur=getShift(wid,dk);
  setShift(wid,dk,SHIFTS[(SHIFTS.indexOf(cur)+1)%SHIFTS.length]);
  render();
}

function renderSummary(days){
  let ore=0,ot=0,attivi=0,notti=0,ferie=0;
  workers.forEach(w=>{
    let ha=false;
    days.forEach(d=>{
      const dk=fmtKey(d); const s=getShift(w.id,dk);
      if(['G','N'].includes(s)){ore+=8;ha=true;}
      if(s==='N') notti++;
      if(s==='FE') ferie++;
      ot+=getOT(w.id,dk);
    });
    if(ha) attivi++;
  });
  document.getElementById('summary-row').innerHTML=`
    <div class="stat-card"><div class="slabel">Ore totali</div><div class="sval">${ore}h</div></div>
    <div class="stat-card"><div class="slabel">Straordinari</div><div class="sval" style="color:#BA7517">${ot}h</div></div>
    <div class="stat-card"><div class="slabel">Operai attivi</div><div class="sval">${attivi}</div></div>
    <div class="stat-card"><div class="slabel">Turni notte</div><div class="sval">${notti}</div></div>
    <div class="stat-card"><div class="slabel">Ferie/riposi</div><div class="sval">${ferie}</div></div>`;
}

// ── Vista mese ────────────────────────────────────────────────────────────────
function renderMonth(){
  const {y,m}=currentMonth;
  document.getElementById('nav-label').textContent=MONTHS_IT[m]+' '+y;
  const sel=document.getElementById('month-worker-sel');
  const prev=sel.value;
  sel.innerHTML=workers.map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join('');
  if(prev&&workers.find(w=>w.id==prev)) sel.value=prev;
  const wid=parseInt(sel.value)||workers[0]?.id;
  if(!wid) return;

  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const startDow=first.getDay()===0?6:first.getDay()-1;
  const today=fmtKey(new Date());
  const total=Math.ceil((startDow+last.getDate())/7)*7;

  let html=DAYS_IT.map(d=>`<div class="day-header">${d}</div>`).join('');
  for(let i=0;i<total;i++){
    const date=new Date(y,m,1+(i-startDow));
    const inM=date.getMonth()===m;
    const dk=fmtKey(date); const s=getShift(wid,dk);
    const ot=getOT(wid,dk); const note=getNote(wid,dk);
    const isToday=dk===today;
    html+=`<div class="month-day${!inM?' other-month':''}${isToday?' today':''}"
      ${inM?`onclick="openCellDetail(${wid},'${dk}')"`:'style="cursor:default"'}
      title="${esc(note)}">
      <div class="day-num" style="${isToday?'color:#185FA5;font-weight:600':''}">${date.getDate()}</div>
      ${inM&&s!=='OFF'?`<div class="month-shift" style="background:${SHIFT_BG[s]};color:${SHIFT_FG[s]}">${SHIFT_LABELS[s]}${ot>0?` +${ot}h`:''}</div>`:''}
      ${note&&inM?`<div style="font-size:9px;color:#185FA5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(note)}</div>`:''}
    </div>`;
  }
  document.getElementById('month-grid').innerHTML=html;

  let ore=0,ot2=0,notti=0,ferie=0;
  for(let d=1;d<=last.getDate();d++){
    const dk=fmtKey(new Date(y,m,d)); const s=getShift(wid,dk);
    if(['G','N'].includes(s)) ore+=8;
    if(s==='N') notti++;
    if(s==='FE') ferie++;
    ot2+=getOT(wid,dk);
  }
  document.getElementById('month-summary').innerHTML=`
    <div class="stat-card"><div class="slabel">Ore lavorate</div><div class="sval">${ore}h</div></div>
    <div class="stat-card"><div class="slabel">Straordinari</div><div class="sval" style="color:#BA7517">${ot2}h</div></div>
    <div class="stat-card"><div class="slabel">Turni notte</div><div class="sval">${notti}</div></div>
    <div class="stat-card"><div class="slabel">Ferie</div><div class="sval">${ferie}</div></div>`;
}

// ── Modal dettaglio cella ─────────────────────────────────────────────────────
// SOLUZIONE al bug: tutto lo stato del modal vive nell'oggetto MS.
// I bottoni turno scrivono in MS.shift (non in un ID globale).
// saveCell() legge SOLO da MS + dai rispettivi input del modal corrente.
// Nessun ID condiviso tra operai → zero cross-talk.

function openCellDetail(wid, dk){
  const w=workers.find(x=>x.id===wid);
  if(!w) return;

  // Carica stato iniziale esclusivamente dai dati di questa cella
  MS = { wid, dk, shift: getShift(wid,dk), ot: getOT(wid,dk), note: getNote(wid,dk) };

  const dateStr = new Date(dk+'T12:00:00')
    .toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">

      <h3>${esc(w.name)}</h3>
      <div class="modal-sub">${dateStr}</div>

      <span class="mlabel">Turno</span>
      <div class="shift-picker" id="sp">
        ${SHIFTS.filter(s=>s!=='OFF').map(s=>
          `<button class="sp-btn${MS.shift===s?' selected':''}"
            style="background:${SHIFT_BG[s]};color:${SHIFT_FG[s]}"
            onclick="msSetShift('${s}',this)">${SHIFT_LABELS[s]}</button>`
        ).join('')}
        <button class="sp-btn${MS.shift==='OFF'?' selected':''}"
          style="background:#f0f0ee;color:#666"
          onclick="msSetShift('OFF',this)">Non assegnato</button>
      </div>

      <span class="mlabel">Commento</span>
      <textarea id="ms-note" placeholder="Es. sostituzione collega, lavoro urgente..."
        oninput="MS.note=this.value">${esc(MS.note)}</textarea>

      <div class="ot-row">
        <label class="ot-label">
          <input type="checkbox" id="ms-ot-chk" onchange="msToggleOT(this.checked)"
            ${MS.ot>0?'checked':''}>
          Straordinario
        </label>
        <div class="ot-hours" id="ms-ot-wrap" style="${MS.ot>0?'':'display:none'}">
          <input type="number" id="ms-ot-val" min="0.5" max="12" step="0.5"
            value="${MS.ot||''}" placeholder="ore"
            oninput="MS.ot=parseFloat(this.value)||0">
          <span>ore</span>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="saveCell()">Salva</button>
      </div>
    </div>
  </div>`;
}

function msSetShift(s, btn){
  MS.shift = s;
  document.getElementById('sp').querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function msToggleOT(checked){
  document.getElementById('ms-ot-wrap').style.display = checked ? '' : 'none';
  if(!checked){ MS.ot=0; document.getElementById('ms-ot-val').value=''; }
}

function saveCell(){
  if(!MS) return;
  // Rilegge sempre dal DOM per sicurezza prima di salvare
  const noteEl = document.getElementById('ms-note');
  const chkEl  = document.getElementById('ms-ot-chk');
  const valEl  = document.getElementById('ms-ot-val');
  MS.note  = noteEl ? noteEl.value.trim() : MS.note;
  MS.ot    = (chkEl&&chkEl.checked) ? (parseFloat(valEl.value)||0) : 0;

  setShift(MS.wid, MS.dk, MS.shift);
  setOT(MS.wid,    MS.dk, MS.ot);
  setNote(MS.wid,  MS.dk, MS.note);

  MS = null;
  closeModal();
  showToast('Salvato!');
  currentView==='week' ? render() : renderMonth();
}

function closeModal(){ MS=null; document.getElementById('modal-area').innerHTML=''; }

// ── Gestione operai ───────────────────────────────────────────────────────────
function openManageWorkers(){
  if(!workers.length){ showToast('Nessun operaio presente'); return; }
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Gestisci operai</h3>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        ${workers.map(w=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #eee;border-radius:8px">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${esc(w.name)}</div>
            <div style="font-size:11px;color:#888;margin-top:2px">${esc(w.role)} &middot; ${tipoBadge(w)}</div>
          </div>
          <button class="btn danger sm" onclick="removeWorker(${w.id})">&#x2715; Rimuovi</button>
        </div>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Chiudi</button>
      </div>
    </div>
  </div>`;
}

function removeWorker(id){
  if(!confirm('Rimuovere questo operaio dal planning?')) return;
  workers=workers.filter(w=>w.id!==id);
  delete schedule[id]; delete overtime[id]; delete notes[id];
  save(); closeModal();
  showToast('Operaio rimosso');
  currentView==='week' ? render() : renderMonth();
}

function openAddWorker(){
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Aggiungi operaio</h3>
      <span class="mlabel">Nome e cognome</span>
      <input type="text" id="add-name" placeholder="Es. Mario Rossi" autofocus />
      <span class="mlabel">Qualifica / Ruolo</span>
      <input type="text" id="add-role" placeholder="Es. Elettricista" />
      <span class="mlabel">Tipo</span>
      <select id="add-tipo">
        <option value="Tecnico/Operaio">Tecnico/Operaio</option>
        <option value="Capo Cantiere">Capo Cantiere</option>
      </select>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="confirmAddWorker()">Aggiungi</button>
      </div>
    </div>
  </div>`;
}

function confirmAddWorker(){
  const name=document.getElementById('add-name').value.trim();
  const role=document.getElementById('add-role').value.trim();
  const tipo=document.getElementById('add-tipo').value;
  if(!name){ alert("Inserisci il nome dell'operaio"); return; }
  workers.push({id:++nextId, name, role:role||'Generico', tipo});
  save(); closeModal();
  showToast('Operaio aggiunto!');
  currentView==='week' ? render() : renderMonth();
}

// ── Esporta CSV ───────────────────────────────────────────────────────────────
function exportCSV(){
  try{
    let rows=[], header=[];
    if(currentView==='week'){
      const days=[]; for(let i=0;i<7;i++) days.push(addDays(currentWeekStart,i));
      header=['Operaio','Tipo','Ruolo'];
      days.forEach(d=>{
        const dl=DAYS_IT[dow(d)]+' '+fmtDate(d);
        header.push('Turno '+dl, 'Straord. '+dl, 'Commento '+dl);
      });
      header.push('Ore reg.','Ore straord. tot.');
      rows=workers.map(w=>{
        const row=[w.name, w.tipo||'Tecnico/Operaio', w.role];
        let oreReg=0, oreOt=0;
        days.forEach(d=>{
          const dk=fmtKey(d); const s=getShift(w.id,dk); const ot=getOT(w.id,dk);
          row.push(SHIFT_LABELS[s], ot>0?ot+'h':'-', getNote(w.id,dk));
          if(['G','N'].includes(s)) oreReg+=8;
          oreOt+=ot;
        });
        row.push(oreReg+'h', oreOt>0?oreOt+'h':'-');
        return row;
      });
    } else {
      const wid=parseInt(document.getElementById('month-worker-sel').value);
      const w=workers.find(x=>x.id===wid);
      if(!w){ showToast('Nessun operaio selezionato'); return; }
      header=['Data','Turno','Ore reg.','Straordinario (h)','Commento'];
      const last=new Date(currentMonth.y,currentMonth.m+1,0).getDate();
      for(let d=1;d<=last;d++){
        const date=new Date(currentMonth.y,currentMonth.m,d);
        const dk=fmtKey(date); const s=getShift(wid,dk); const ot=getOT(wid,dk);
        rows.push([fmtDate(date),SHIFT_LABELS[s],['G','N'].includes(s)?'8h':'0h',ot>0?ot+'h':'-',getNote(wid,dk)]);
      }
      rows.unshift([`${w.name} (${w.tipo||'Tecnico/Operaio'}) — ${MONTHS_IT[currentMonth.m]} ${currentMonth.y}`,'','','','']);
    }
    const q=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const csv=[header,...rows].map(r=>r.map(q).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='planning_operai.csv';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast('CSV esportato con successo!');
  } catch(e){ showToast('Errore: '+e.message); }
}

// ── Avvio ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
