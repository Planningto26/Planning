<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Operai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem}
.app{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;border:1px solid #e0dfd8}
h1{font-size:20px;font-weight:600;margin-bottom:1.25rem;color:#1a1a1a}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.toolbar-title{font-size:16px;font-weight:500;flex:1;min-width:120px}
.btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.danger:hover{background:#791F1F}
.btn.sm{padding:3px 8px;font-size:11px}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.nav-bar span{font-size:13px;color:#666;min-width:180px;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.grid-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{font-size:11px;font-weight:500;color:#666;padding:7px 5px;border-bottom:1px solid #e8e8e4;text-align:center;background:#f8f8f6}
thead th.op-col{text-align:left;min-width:130px;padding-left:8px}
tbody tr{border-bottom:1px solid #f0f0ec}
tbody tr:hover td{background:#fafaf8}
td.op-cell{padding:7px 8px;font-size:12px;font-weight:600;white-space:nowrap}
td.op-cell .ruolo{font-size:11px;font-weight:400;color:#888}
td.shift-cell{padding:3px;text-align:center;min-width:52px}
.shift-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 5px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;min-width:40px;user-select:none;position:relative}
.shift-badge:hover{opacity:.8}
.s-G{background:#B5D4F4;color:#0C447C}
.s-S{background:#FAC775;color:#633806}
.s-N{background:#CECBF6;color:#3C3489}
.s-R{background:#D3D1C7;color:#444}
.s-FE{background:#F5C4B3;color:#712B13}
.s-OFF{background:transparent;color:#aaa;border:1px dashed #ddd}
.ot-dot{position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:#BA7517}
.note-dot{position:absolute;top:1px;left:1px;width:5px;height:5px;border-radius:50%;background:#185FA5}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1.25rem}
.stat-card{background:#f5f5f3;border-radius:8px;padding:10px 14px;flex:1;min-width:90px}
.stat-card .slabel{font-size:11px;color:#888;margin-bottom:3px}
.stat-card .sval{font-size:20px;font-weight:600;color:#1a1a1a}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:12px;border:1px solid #ddd;padding:1.5rem;min-width:280px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal label{font-size:11px;color:#666;display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 10px;font-size:13px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;outline:none}
.modal textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.shift-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px}
.sp-btn{padding:6px;border-radius:4px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:560px}
.month-grid-wrapper{overflow-x:auto;margin-bottom:1rem}
.day-header{font-size:11px;font-weight:500;color:#666;text-align:center;padding:4px 0;background:#f8f8f6;border-radius:3px}
.month-day{border-radius:5px;border:1px solid #eee;background:#fff;min-height:64px;padding:3px;cursor:pointer}
.month-day:hover{border-color:#aaa}
.month-day.other-month{opacity:.3;cursor:default}
.month-day.today{border-color:#185FA5}
.day-num{font-size:10px;color:#888;margin-bottom:2px}
.month-shift{font-size:9px;font-weight:600;border-radius:2px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-note{font-size:10px;color:#185FA5;margin-top:2px;text-align:left;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:9px 22px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.container{position:relative}
</style>
</head>
<body>
<div class="app">
  <h1>&#128197; Planning Operai</h1>

  <div class="toolbar">
    <div style="display:flex;gap:4px">
      <button class="btn active" id="tab-week" onclick="switchView('week')">Vista settimana</button>
      <button class="btn" id="tab-month" onclick="switchView('month')">Vista mese</button>
    </div>
    <button class="btn primary" onclick="openAddWorker()">+ Aggiungi operaio</button>
    <button class="btn" onclick="openManageWorkers()">Gestisci operai</button>
    <button class="btn" onclick="exportCSV()">&#11015; Esporta CSV</button>
  </div>

  <div class="nav-bar">
    <button class="btn" onclick="navPrev()">&#8592;</button>
    <span id="nav-label"></span>
    <button class="btn" onclick="navNext()">&#8594;</button>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4"></div>Giornata (G)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#CECBF6"></div>Notte (N)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D3D1C7"></div>Riposo (R)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#F5C4B3"></div>Ferie (FE)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>Straordinario</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5;width:6px;height:6px;border-radius:50%"></div>Nota</div>
  </div>

  <div class="container">
    <div id="view-week">
      <div class="grid-wrapper">
        <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
      </div>
      <div class="summary-row" id="summary-row"></div>
    </div>

    <div id="view-month" style="display:none">
      <div class="month-grid-wrapper">
        <div class="month-grid" id="month-grid"></div>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:#666">Operaio:</label>
        <select id="month-worker-sel" onchange="renderMonth()" style="font-size:13px;padding:5px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;outline:none"></select>
      </div>
      <div class="summary-row" id="month-summary"></div>
    </div>

    <div id="modal-area"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHIFTS=['G','N','R','FE','OFF'];
const SHIFT_LABELS={G:'Giornata',N:'Notte',R:'Riposo',FE:'Ferie',OFF:'Non assegnato'};
const SHIFT_BG={G:'#B5D4F4',N:'#CECBF6',R:'#D3D1C7',FE:'#F5C4B3',OFF:'transparent'};
const SHIFT_FG={G:'#0C447C',N:'#3C3489',R:'#444',FE:'#712B13',OFF:'#aaa'};
const SHIFT_CSS={G:'s-G',N:'s-N',R:'s-R',FE:'s-FE',OFF:'s-OFF'};
const RUOLI_TIPO=['Tecnico/Operaio','Capo Cantiere'];
const DAYS_IT=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let currentView='week';
let currentWeekStart=getWeekStart(new Date('2026-05-01'));
let currentMonth={y:2026,m:4};
let nextId=100;

let workers=JSON.parse(localStorage.getItem('po_workers')||'null')||[
  {id:1,name:'Marco Bianchi',role:'Elettricista',tipo:'Tecnico/Operaio'},
  {id:2,name:'Luigi Rossi',role:'Idraulico',tipo:'Tecnico/Operaio'},
  {id:3,name:'Giovanni Verdi',role:'Muratore',tipo:'Tecnico/Operaio'},
  {id:4,name:'Antonio Neri',role:'Carpentiere',tipo:'Capo Cantiere'},
  {id:5,name:'Franco Esposito',role:'Elettricista',tipo:'Tecnico/Operaio'},
];
let schedule=JSON.parse(localStorage.getItem('po_schedule')||'{}');
let overtime=JSON.parse(localStorage.getItem('po_overtime')||'{}');
let notes=JSON.parse(localStorage.getItem('po_notes')||'{}');

function save(){
  localStorage.setItem('po_workers',JSON.stringify(workers));
  localStorage.setItem('po_schedule',JSON.stringify(schedule));
  localStorage.setItem('po_overtime',JSON.stringify(overtime));
  localStorage.setItem('po_notes',JSON.stringify(notes));
}

function getWeekStart(d){
  const date=new Date(d);const day=date.getDay();
  date.setDate(date.getDate()+(day===0?-6:1-day));date.setHours(0,0,0,0);return date;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});}
function fmtDateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getShift(wid,dk){return(schedule[wid]&&schedule[wid][dk])||'OFF';}
function setShift(wid,dk,s){if(!schedule[wid])schedule[wid]={};schedule[wid][dk]=s;save();}
function getOT(wid,dk){return(overtime[wid]&&overtime[wid][dk])||0;}
function setOT(wid,dk,v){if(!overtime[wid])overtime[wid]={};overtime[wid][dk]=v;save();}
function getNote(wid,dk){return(notes[wid]&&notes[wid][dk])||'';}
function setNote(wid,dk,v){if(!notes[wid])notes[wid]={};notes[wid][dk]=v;save();}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function switchView(v){
  currentView=v;
  document.getElementById('view-week').style.display=v==='week'?'':'none';
  document.getElementById('view-month').style.display=v==='month'?'':'none';
  document.getElementById('tab-week').className='btn'+(v==='week'?' active':'');
  document.getElementById('tab-month').className='btn'+(v==='month'?' active':'');
  if(v==='month')renderMonth();else render();
}
function navPrev(){
  if(currentView==='week'){currentWeekStart=addDays(currentWeekStart,-7);render();}
  else{currentMonth.m--;if(currentMonth.m<0){currentMonth.m=11;currentMonth.y--;}renderMonth();}
}
function navNext(){
  if(currentView==='week'){currentWeekStart=addDays(currentWeekStart,7);render();}
  else{currentMonth.m++;if(currentMonth.m>11){currentMonth.m=0;currentMonth.y++;}renderMonth();}
}

function render(){
  const days=[];for(let i=0;i<7;i++)days.push(addDays(currentWeekStart,i));
  document.getElementById('nav-label').textContent=fmtDate(days[0])+' — '+fmtDate(days[6])+' '+days[0].getFullYear();

  // Header: Data col + one col per worker
  const tipoBadge=w=>{
    const cc=w.tipo==='Capo Cantiere';
    return `<span style="display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-top:2px;background:${cc?'#CECBF6':'#C0DD97'};color:${cc?'#3C3489':'#27500A'}">${w.tipo||'Tecnico/Operaio'}</span>`;
  };
  document.getElementById('table-head').innerHTML='<tr><th style="text-align:left;min-width:90px;padding-left:8px;font-size:11px;font-weight:500;color:#666;background:#f8f8f6;border-bottom:1px solid #e8e8e4">Data</th>'+
    workers.map(w=>`<th style="min-width:110px;background:#f8f8f6;border-bottom:1px solid #e8e8e4;padding:5px 4px">
      <div style="font-size:11px;font-weight:600;color:#1a1a1a">${w.name}</div>
      <div style="font-size:10px;font-weight:400;color:#888">${w.role}</div>
      ${tipoBadge(w)}
    </th>`).join('')+
    '<th style="min-width:55px;text-align:center;background:#f8f8f6;border-bottom:1px solid #e8e8e4;font-size:11px;font-weight:500;color:#666"></th></tr>';

  // Body: one row per day
  document.getElementById('table-body').innerHTML=days.map(d=>{
    const dk=fmtDateKey(d);
    const dayLabel=`<td style="padding:6px 8px;font-size:11px;font-weight:600;color:#444;white-space:nowrap;border-right:1px solid #f0f0ec">${DAYS_IT[d.getDay()===0?6:d.getDay()-1]}<br><span style="font-weight:400;color:#888">${fmtDate(d)}</span></td>`;
    const workerCells=workers.map(w=>{
      const s=getShift(w.id,dk);
      const ot=getOT(w.id,dk);
      const note=getNote(w.id,dk);
      return `<td class="shift-cell" style="vertical-align:top">
        <span class="shift-badge ${SHIFT_CSS[s]}" onclick="cycleShift(${w.id},'${dk}')">${s==='OFF'?'—':s}
          ${note?`<span class="note-dot"></span>`:''}
        </span>
        ${ot>0?`<span style="display:inline-block;font-size:9px;font-weight:600;background:#FAC775;color:#633806;border-radius:3px;padding:1px 4px;margin-left:2px">+${ot}h</span>`:''}
        ${note?`<span class="cell-note" title="${note.replace(/"/g,'&quot;')}">${note}</span>`:''}
        <div style="margin-top:2px;text-align:center">
          <button class="btn sm" onclick="openCellDetail(${w.id},'${dk}')" title="Modifica dettaglio">&#9998;</button>
        </div>
      </td>`;
    }).join('');
    return `<tr>${dayLabel}${workerCells}<td></td></tr>`;
  }).join('');

  renderSummary(days);
}

function cycleShift(wid,dk){
  const cur=getShift(wid,dk);setShift(wid,dk,SHIFTS[(SHIFTS.indexOf(cur)+1)%SHIFTS.length]);render();
}

function renderSummary(days){
  let ore=0,ot=0,attivi=0,notti=0,ferie=0;
  workers.forEach(w=>{
    let ha=false;
    days.forEach(d=>{const dk=fmtDateKey(d);const s=getShift(w.id,dk);
      if(['G','N'].includes(s)){ore+=8;ha=true;}
      if(s==='N')notti++;if(s==='FE')ferie++;ot+=getOT(w.id,dk);
    });if(ha)attivi++;
  });
  document.getElementById('summary-row').innerHTML=`
    <div class="stat-card"><div class="slabel">Ore totali</div><div class="sval">${ore}h</div></div>
    <div class="stat-card"><div class="slabel">Straordinari</div><div class="sval" style="color:#BA7517">${ot}h</div></div>
    <div class="stat-card"><div class="slabel">Operai attivi</div><div class="sval">${attivi}</div></div>
    <div class="stat-card"><div class="slabel">Turni notte</div><div class="sval">${notti}</div></div>
    <div class="stat-card"><div class="slabel">Ferie/riposi</div><div class="sval">${ferie}</div></div>`;
}

function renderMonth(){
  document.getElementById('nav-label').textContent=MONTHS_IT[currentMonth.m]+' '+currentMonth.y;
  const sel=document.getElementById('month-worker-sel');
  const prev=sel.value;
  sel.innerHTML=workers.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');
  if(prev&&workers.find(w=>w.id==prev))sel.value=prev;
  const wid=parseInt(sel.value)||workers[0]?.id;
  if(!wid)return;
  const y=currentMonth.y,m=currentMonth.m;
  const firstDay=new Date(y,m,1);const lastDay=new Date(y,m+1,0);
  const startDow=firstDay.getDay()===0?6:firstDay.getDay()-1;
  const today=fmtDateKey(new Date());
  let html=DAYS_IT.map(d=>`<div class="day-header">${d}</div>`).join('');
  const total=Math.ceil((startDow+lastDay.getDate())/7)*7;
  for(let i=0;i<total;i++){
    const date=new Date(y,m,1+(i-startDow));
    const inMonth=date.getMonth()===m;const dk=fmtDateKey(date);
    const s=getShift(wid,dk);const ot=getOT(wid,dk);const note=getNote(wid,dk);
    const isToday=dk===today;
    html+=`<div class="month-day${!inMonth?' other-month':''}${isToday?' today':''}" ${inMonth?`onclick="openCellDetail(${wid},'${dk}')"`:'style="cursor:default"'} title="${note.replace(/"/g,'&quot;')}">
      <div class="day-num" style="${isToday?'color:#185FA5;font-weight:600':''}">${date.getDate()}</div>
      ${inMonth&&s!=='OFF'?`<div class="month-shift" style="background:${SHIFT_BG[s]};color:${SHIFT_FG[s]}">${SHIFT_LABELS[s]}${ot>0?` +${ot}h`:''}</div>`:''}
      ${note&&inMonth?`<div style="font-size:9px;color:#185FA5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${note}</div>`:''}
    </div>`;
  }
  document.getElementById('month-grid').innerHTML=html;
  let ore=0,ot=0,notti=0,ferie=0;
  for(let d=1;d<=lastDay.getDate();d++){
    const dk=fmtDateKey(new Date(y,m,d));const s=getShift(wid,dk);
    if(['G','N'].includes(s))ore+=8;if(s==='N')notti++;if(s==='FE')ferie++;ot+=getOT(wid,dk);
  }
  document.getElementById('month-summary').innerHTML=`
    <div class="stat-card"><div class="slabel">Ore lavorate</div><div class="sval">${ore}h</div></div>
    <div class="stat-card"><div class="slabel">Straordinari</div><div class="sval" style="color:#BA7517">${ot}h</div></div>
    <div class="stat-card"><div class="slabel">Turni notte</div><div class="sval">${notti}</div></div>
    <div class="stat-card"><div class="slabel">Ferie</div><div class="sval">${ferie}</div></div>`;
}

function openCellDetail(wid,dk){
  const w=workers.find(x=>x.id===wid);
  const curS=getShift(wid,dk);const curOT=getOT(wid,dk);const curNote=getNote(wid,dk);
  const d=new Date(dk+'T12:00:00');
  const dateStr=d.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" onclick="closeModal(event,this)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${w.name}<br><span style="font-size:12px;font-weight:400;color:#888">${dateStr}</span></h3>
      <label>Turno</label>
      <div class="shift-picker">
        ${SHIFTS.filter(s=>s!=='OFF').map(s=>`<button class="sp-btn" style="background:${SHIFT_BG[s]};color:${SHIFT_FG[s]};${curS===s?'outline:2px solid #185FA5;':''}" onclick="selectShift(${wid},'${dk}','${s}',this)">${SHIFT_LABELS[s]}</button>`).join('')}
        <button class="sp-btn" style="background:#f0f0ee;color:#666;${curS==='OFF'?'outline:2px solid #185FA5;':''}" onclick="selectShift(${wid},'${dk}','OFF',this)">Non assegnato</button>
      </div>
      <label style="margin-top:12px;display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="m-ot-check" onchange="toggleOT()" ${curOT>0?'checked':''} style="width:auto;margin:0"/>
        <span style="font-size:12px;color:#633806;font-weight:600">Straordinario</span>
      </label>
      <div id="m-ot-wrap" style="margin-top:6px;${curOT>0?'':'display:none'}">
        <label>Ore straordinarie</label>
        <input type="number" id="m-ot" min="0.5" max="12" step="0.5" value="${curOT||''}" placeholder="es. 2" />
      </div>
      <label>Commento</label>
      <textarea id="m-note" placeholder="Es. sostituzione collega, lavoro urgente...">${curNote}</textarea>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('modal-area').innerHTML=''">Annulla</button>
        <button class="btn primary" onclick="saveCell(${wid},'${dk}')">Salva</button>
      </div>
    </div>
  </div>`;
}

function toggleOT(){
  const checked=document.getElementById('m-ot-check').checked;
  document.getElementById('m-ot-wrap').style.display=checked?'':'none';
  if(!checked&&document.getElementById('m-ot'))document.getElementById('m-ot').value='';
}

function selectShift(wid,dk,s,btn){
  setShift(wid,dk,s);
  btn.closest('.shift-picker').querySelectorAll('.sp-btn').forEach(b=>b.style.outline='');
  btn.style.outline='2px solid #185FA5';
}

function saveCell(wid,dk){
  const otCheck=document.getElementById('m-ot-check').checked;
  const ot=otCheck?(parseFloat(document.getElementById('m-ot').value)||0):0;
  const note=document.getElementById('m-note').value.trim();
  setOT(wid,dk,ot);setNote(wid,dk,note);
  document.getElementById('modal-area').innerHTML='';
  showToast('Salvato!');
  if(currentView==='week')render();else renderMonth();
}

function closeModal(e,el){if(e.target===el)document.getElementById('modal-area').innerHTML='';}

function removeWorker(id){
  if(!confirm('Rimuovere questo operaio dal planning?'))return;
  workers=workers.filter(w=>w.id!==id);
  delete schedule[id];delete overtime[id];delete notes[id];
  save();
  document.getElementById('modal-area').innerHTML='';
  openManageWorkers();
}

function openManageWorkers(){
  if(workers.length===0){showToast('Nessun operaio presente');return;}
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" onclick="closeModal(event,this)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Gestisci operai</h3>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
        ${workers.map(w=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #eee;border-radius:8px">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${w.name}</div>
            <div style="font-size:11px;color:#888">${w.role} &middot; <span style="color:${w.tipo==='Capo Cantiere'?'#3C3489':'#27500A'}">${w.tipo||'Tecnico/Operaio'}</span></div>
          </div>
          <button class="btn danger sm" onclick="removeWorker(${w.id})">&#x2715; Rimuovi</button>
        </div>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('modal-area').innerHTML=''">Chiudi</button>
      </div>
    </div>
  </div>`;
}

function openAddWorker(){
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" onclick="closeModal(event,this)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Aggiungi operaio</h3>
      <label>Nome e cognome</label>
      <input id="m-name" placeholder="Es. Mario Rossi" autofocus />
      <label>Qualifica / Ruolo</label>
      <input id="m-role" placeholder="Es. Elettricista" />
      <label>Tipo</label>
      <select id="m-tipo">
        <option value="Tecnico/Operaio">Tecnico/Operaio</option>
        <option value="Capo Cantiere">Capo Cantiere</option>
      </select>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('modal-area').innerHTML=''">Annulla</button>
        <button class="btn primary" onclick="confirmAddWorker()">Aggiungi</button>
      </div>
    </div>
  </div>`;
}

function confirmAddWorker(){
  const name=document.getElementById('m-name').value.trim();
  const role=document.getElementById('m-role').value.trim();
  const tipo=document.getElementById('m-tipo').value;
  if(!name){alert('Inserisci il nome dell\'operaio');return;}
  workers.push({id:++nextId,name,role:role||'Generico',tipo});
  save();
  document.getElementById('modal-area').innerHTML='';
  showToast('Operaio aggiunto!');
  if(currentView==='week')render();else renderMonth();
}

function exportCSV(){
  try{
    let rows=[],header=[];
    if(currentView==='week'){
      const days=[];for(let i=0;i<7;i++)days.push(addDays(currentWeekStart,i));
      // Header: Data + per ogni giorno: Turno + Straord. + Commento
      header=['Operaio','Tipo','Ruolo'];
      days.forEach(d=>{
        const dl=DAYS_IT[d.getDay()===0?6:d.getDay()-1]+' '+fmtDate(d);
        header.push('Turno '+dl,'Straord. '+dl,'Commento '+dl);
      });
      header.push('Ore reg.','Ore straord. tot.');
      rows=workers.map(w=>{
        const row=[w.name,w.tipo||'Tecnico/Operaio',w.role];
        let oreReg=0,oreOt=0;
        days.forEach(d=>{
          const dk=fmtDateKey(d);const s=getShift(w.id,dk);const ot=getOT(w.id,dk);
          row.push(SHIFT_LABELS[s],ot>0?ot+'h':'-',getNote(w.id,dk));
          if(['G','N'].includes(s))oreReg+=8;
          oreOt+=ot;
        });
        row.push(oreReg+'h',oreOt>0?oreOt+'h':'-');
        return row;
      });
    } else {
      const wid=parseInt(document.getElementById('month-worker-sel').value);
      const w=workers.find(x=>x.id===wid);
      if(!w){showToast('Nessun operaio selezionato');return;}
      header=['Data','Turno','Ore reg.','Straordinario (h)','Commento'];
      const lastDay=new Date(currentMonth.y,currentMonth.m+1,0).getDate();
      for(let d=1;d<=lastDay;d++){
        const date=new Date(currentMonth.y,currentMonth.m,d);
        const dk=fmtDateKey(date);const s=getShift(wid,dk);const ot=getOT(wid,dk);
        rows.push([fmtDate(date),SHIFT_LABELS[s],['G','N'].includes(s)?'8h':'0h',ot>0?ot+'h':'-',getNote(wid,dk)]);
      }
      rows.unshift([`${w.name} (${w.tipo||'Tecnico/Operaio'}) — ${MONTHS_IT[currentMonth.m]} ${currentMonth.y}`,'','','','']);
    }
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const csv=[header,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='planning_operai.csv';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    showToast('CSV esportato con successo!');
  }catch(e){showToast('Errore esportazione: '+e.message);}
}

render();
</script>
